name: CI / Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Required for the GitHub Pages deployment job
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments but allow parallel test runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npx jest --watchAll=false --ci --no-coverage
        env:
          CI: true

  # ── 2. Web export & GitHub Pages deployment ─────────────────────────────────
  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on pushes to the default branch (not on PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # expo export --platform web outputs to dist/
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
