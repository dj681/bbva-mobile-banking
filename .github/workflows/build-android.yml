name: Build & Release Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Allow creating releases and uploading assets
permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK (Local)
    runs-on: ubuntu-latest
    # Skip on pull requests — only build on direct pushes / manual triggers
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # JDK 17 is required by the Android Gradle plugin
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Accept Android SDK licences so Gradle does not prompt during the build
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Generate the native android/ directory from the Expo config
      # --no-install: skip a redundant npm install (we already ran npm ci)
      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install

      # Set up the release keystore used to sign the APK.
      #
      # Preferred (consistent signing — supports OTA updates):
      #   Store a base64-encoded keystore as RELEASE_KEYSTORE_BASE64, together
      #   with KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD secrets.
      #   Generate once with:
      #     keytool -genkeypair -v -keystore release.keystore -alias bbvatr \
      #       -keyalg RSA -keysize 2048 -validity 10000 \
      #       -dname "CN=BBVA TR, OU=Mobile, O=BBVA TR, L=Istanbul, ST=Istanbul, C=TR"
      #     base64 -w 0 release.keystore   # paste output into RELEASE_KEYSTORE_BASE64 secret
      #
      # Fallback (if secrets not configured): a temporary keystore is generated
      # per-run.  Each APK will be signed with a different key — users must
      # uninstall the previous version before installing the new one.
      - name: Set up release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p android/app
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            echo "KEYSTORE_FILE=$(pwd)/android/app/release.keystore" >> "$GITHUB_ENV"
            echo "KEYSTORE_PASS=$KEYSTORE_PASSWORD"                  >> "$GITHUB_ENV"
            echo "KEY_ALIAS_VAL=$KEY_ALIAS"                          >> "$GITHUB_ENV"
            echo "KEY_PASS=$KEY_PASSWORD"                            >> "$GITHUB_ENV"
            echo "✅ Using stored release keystore (consistent signing)."
          else
            echo "⚠️  RELEASE_KEYSTORE_BASE64 secret not set — generating a temporary keystore."
            echo "   Each build will have a different signing key."
            echo "   Users must uninstall the previous version before installing this APK."
            keytool -genkeypair -v \
              -keystore android/app/release.keystore \
              -alias bbvatr -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass bbvatr_demo -keypass bbvatr_demo \
              -dname "CN=BBVA TR, OU=Mobile, O=BBVA TR, L=Istanbul, ST=Istanbul, C=TR"
            echo "KEYSTORE_FILE=$(pwd)/android/app/release.keystore" >> "$GITHUB_ENV"
            echo "KEYSTORE_PASS=bbvatr_demo"                         >> "$GITHUB_ENV"
            echo "KEY_ALIAS_VAL=bbvatr"                              >> "$GITHUB_ENV"
            echo "KEY_PASS=bbvatr_demo"                              >> "$GITHUB_ENV"
          fi

      # Wire the release keystore into Gradle via project properties so the
      # release build type is signed and Android can install the APK.
      # V2 and V3 signing are enabled by default in AGP ≥ 2.2 and 3.0 respectively,
      # but we set them explicitly to ensure the APK passes Play Protect validation.
      - name: Enable V2/V3 APK signing in build.gradle
        run: |
          GRADLE_FILE="android/app/build.gradle"
          # Inject v2SigningEnabled and v3SigningEnabled into every signingConfig block
          if [ -f "$GRADLE_FILE" ]; then
            sed -i '/signingConfigs\s*{/,/^[[:space:]]*}/ {
              /storeFile\|storePassword\|keyAlias\|keyPassword/ {
                /v2SigningEnabled/! {
                  /keyPassword/ a\\            v2SigningEnabled true\n            v3SigningEnabled true
                }
              }
            }' "$GRADLE_FILE" || true
          fi

      - name: Build release APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS_VAL" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"

      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" bbva-mobile-banking.apk

      # Always upload as a workflow artifact (available 30 days)
      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbva-mobile-banking-apk
          path: bbva-mobile-banking.apk
          retention-days: 30

      # Publish/update a persistent "latest-apk" GitHub Release so the APK
      # is always reachable at a stable URL for mobile download.
      - name: Publish GitHub Release (latest-apk)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="latest-apk"
          RELEASE_TITLE="📱 BBVA — Dernière version APK Android"
          RELEASE_NOTES="## 📱 Télécharger BBVA

          Appuyez sur **\`bbva-mobile-banking.apk\`** ci-dessous pour télécharger l'application sur votre Android.

          > **Build** : \`${{ github.sha }}\` — \`$(date -u '+%Y-%m-%d %H:%M UTC')\`

          ---

          ### ⚠️ Message d'avertissement lors du téléchargement

          Lorsque vous téléchargez l'APK via **WhatsApp, Gmail ou un autre service de messagerie**, un message du type **« Ce fichier peut être dangereux »** ou **« Fichier nuisible détecté »** peut s'afficher. **C'est tout à fait normal et attendu.**

          **Pourquoi ce message apparaît-il ?**
          - Les applications téléchargées en dehors du Google Play Store déclenchent automatiquement un avertissement de sécurité d'Android (Google Play Protect).
          - WhatsApp bloque ou avertit systématiquement pour les fichiers APK par mesure de précaution.
          - Ce message ne signifie pas que l'application est malveillante — il s'agit d'une protection standard d'Android pour toutes les applications hors Play Store.

          **Comment contourner cet avertissement en toute sécurité :**

          #### Via WhatsApp
          1. WhatsApp peut bloquer l'envoi/réception direct de fichiers APK. Utilisez plutôt le **lien de téléchargement direct** ci-dessous, ou envoyez le lien GitHub par WhatsApp.
          2. Si vous recevez quand même l'APK via WhatsApp, appuyez sur **\"Télécharger\"** puis **\"Ouvrir avec\"** → **Gestionnaire de fichiers**.
          3. Naviguez jusqu'au fichier téléchargé et appuyez dessus pour l'installer.

          #### Via Email / Navigateur
          1. Téléchargez le fichier \`bbva-mobile-banking.apk\` depuis cette page GitHub.
          2. Si Android affiche **\"Bloquer\"** ou **\"Ignorer\"** → choisissez **\"Ignorer\"** pour continuer.
          3. Si Play Protect demande une analyse → appuyez sur **\"Installer quand même\"**.

          ---

          ### 📋 Instructions d'installation

          1. **Téléchargez** le fichier \`bbva-mobile-banking.apk\` ci-dessous en appuyant dessus.
          2. Sur votre appareil Android, allez dans **Paramètres → Applications → Accès spécial → Installer des applis inconnues**.
          3. Activez l'autorisation pour votre **navigateur** ou **gestionnaire de fichiers**.
          4. Ouvrez le fichier APK téléchargé et appuyez sur **Installer**.
          5. Si Play Protect affiche un avertissement, appuyez sur **\"Installer quand même\"**.
          6. Lancez **BBVA** depuis votre écran d'accueil.

          > ⚠️ Si vous aviez une version précédente installée, **désinstallez-la d'abord** avant d'installer ce nouvel APK.

          ---

          ### 🔑 Identifiants de démonstration

          | Champ | Valeur |
          |-------|--------|
          | Email | \`demo@bbva.fr\` |
          | Mot de passe | \`demo1234\` |

          > ⚠️ Cette application utilise uniquement des **données fictives** à des fins de démonstration."

          # Replace any existing "latest-apk" release with the freshly built APK.
          # Note: there is a brief window between deletion and creation where no
          # release exists — this is acceptable for an internal distribution APK.
          gh release delete "$RELEASE_TAG" \
            --yes \
            --repo "$GITHUB_REPOSITORY" \
            2>/dev/null || true

          gh api \
            "repos/$GITHUB_REPOSITORY/git/refs/tags/$RELEASE_TAG" \
            -X DELETE \
            2>/dev/null || true

          # Create the new release and attach the APK
          gh release create "$RELEASE_TAG" \
            bbva-mobile-banking.apk \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES" \
            --latest
