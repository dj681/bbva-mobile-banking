<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBVA Mobile Banking</title>
    <script>
        (function() {
            var path = window.location.pathname.replace(/^(\/bbva-mobile-banking)/, '');
            if (path && !path.match(/\.(js|css|json|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$/)) {
                sessionStorage.redirect = path;
                window.location.href = '/bbva-mobile-banking/';
            }
        })();
    </script>
</head>
<body>
    <div id="app"></div>
</body>
</html>
